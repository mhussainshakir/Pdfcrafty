<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact PDFCrafty</title>
<meta name="description" content="Get in touch with the PDFCrafty team for support, feedback, or questions about our free online PDF tools.">
<link rel="canonical" href="https://pdfcrafty.com/contact.html">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="site-header"></div>

<div class="content-section" style="padding-top:48px;">
  <h1 style="font-size:2.2rem; font-weight:800; margin-bottom:16px;">Contact Us</h1>
  <p>Have a question, found a bug, or want to suggest a new tool? We'd love to hear from you.</p>

  <div class="controls-card" style="max-width:600px; margin-top:24px;">
    <h4 style="margin-bottom:16px;">Send us a message</h4>
    <div class="option-row" style="flex-direction:column; align-items:stretch; gap:8px;">
      <label for="nameInput">Name</label>
      <input type="text" id="nameInput" placeholder="Your name" style="width:100%;">
    </div>
    <div class="option-row" style="flex-direction:column; align-items:stretch; gap:8px;">
      <label for="emailInput">Email</label>
      <input type="text" id="emailInput" placeholder="you@example.com" style="width:100%;">
    </div>
    <div class="option-row" style="flex-direction:column; align-items:stretch; gap:8px;">
      <label for="messageInput">Message</label>
      <textarea id="messageInput" rows="5" placeholder="How can we help?" style="width:100%; padding:8px 12px; border:1.5px solid var(--border); border-radius:6px; font-family:inherit; font-size:0.9rem;"></textarea>
    </div>
    <button class="btn btn-block" id="sendBtn" style="margin-top:12px;">Send Message</button>
    <p id="formNote" style="font-size:0.82rem; margin-top:10px; text-align:center;"></p>
  </div>

  <h2 style="margin-top:48px;">Other Ways to Reach Us</h2>
  <p>Email: <a href="mailto:shakirmhussain12@gmail.com">shakirmhussain12@gmail.com</a></p>
</div>

<div id="site-footer"></div>
<script src="/layout.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDpZrViTMc4iaerhWPUcCtuoXuigL3axl8",
    authDomain: "pdf-crafty.firebaseapp.com",
    projectId: "pdf-crafty",
    storageBucket: "pdf-crafty.firebasestorage.app",
    messagingSenderId: "736090907986",
    appId: "1:736090907986:web:4aa3dc716c4235c481068b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const sendBtn = document.getElementById("sendBtn");
  const note = document.getElementById("formNote");

  sendBtn.addEventListener("click", async () => {
    const name = document.getElementById("nameInput").value.trim();
    const email = document.getElementById("emailInput").value.trim();
    const message = document.getElementById("messageInput").value.trim();

    if (!name || !email || !message) {
      note.textContent = "Please fill in all fields.";
      note.style.color = "var(--danger)";
      return;
    }

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
      note.textContent = "Please enter a valid email address.";
      note.style.color = "var(--danger)";
      return;
    }

    sendBtn.disabled = true;
    sendBtn.textContent = "Sending...";
    note.textContent = "";

    try {
      await addDoc(collection(db, "contactMessages"), {
        name,
        email,
        message,
        createdAt: serverTimestamp(),
        page: window.location.href,
        userAgent: navigator.userAgent
      });

      document.getElementById("nameInput").value = "";
      document.getElementById("emailInput").value = "";
      document.getElementById("messageInput").value = "";
      note.textContent = "Message sent! We'll get back to you soon.";
      note.style.color = "var(--success)";
    } catch (err) {
      console.error("Error sending message:", err);
      note.textContent = "Something went wrong. Please try again or email us directly.";
      note.style.color = "var(--danger)";
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = "Send Message";
    }
  });
</script>
</body>
</html>
